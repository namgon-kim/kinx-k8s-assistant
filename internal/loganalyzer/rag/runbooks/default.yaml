cases:
  - title: "CrashLoopBackOff - 메모리 부족 (OOMKilled)"
    cause: "Pod의 메모리 사용량이 설정된 limit을 초과하여 커널이 프로세스를 종료"
    resolution: "1. kubectl describe pod으로 이벤트 확인. 2. kubectl set resources로 memory limit 증가. 3. 애플리케이션의 메모리 누수 분석 필요"
    patterns: ["CrashLoop", "OOMKilled"]
    source: "https://kubernetes.io/docs/tasks/configure-pod-container/assign-memory-resource/"

  - title: "CrashLoopBackOff - 애플리케이션 초기화 실패"
    cause: "Pod의 컨테이너가 시작할 때 설정 오류, 의존성 부재, 또는 코드 버그로 인해 즉시 종료"
    resolution: "1. kubectl logs로 전체 로그 확인. 2. 초기화 스크립트 및 설정 파일 검증. 3. 환경 변수 및 Secret 확인. 4. 컨테이너 이미지 테스트"
    patterns: ["CrashLoop", "ErrorSpike"]
    source: "https://kubernetes.io/docs/tasks/debug/debug-pod-crash/"

  - title: "ImagePullBackOff"
    cause: "컨테이너 이미지를 레지스트리에서 다운로드할 수 없음. 이유: 이미지 태그 오류, 레지스트리 접근 불가, imagePullSecret 미설정"
    resolution: "1. kubectl describe pod로 이벤트 확인. 2. 이미지 태그 및 경로 검증. 3. imagePullSecret 확인 및 설정. 4. 네트워크/방화벽 확인. 5. 레지스트리 인증 정보 갱신"
    patterns: ["ErrorSpike"]
    source: "https://kubernetes.io/docs/tasks/pull-image-private-registry/"

  - title: "Pending Pod - 리소스 부족"
    cause: "클러스터의 가용 리소스(CPU/메모리)가 부족하여 Pod을 할당할 수 없음"
    resolution: "1. kubectl describe node로 노드 리소스 상태 확인. 2. 불필요한 Pod 제거. 3. 노드 추가. 4. Pod의 리소스 요청값(requests) 조정"
    patterns: ["ErrorSpike"]
    source: "https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/"

  - title: "Disk Full - 로그/데이터 저장소 부족"
    cause: "Pod이 사용하는 Persistent Volume 또는 임시 저장소의 디스크 공간이 부족"
    resolution: "1. kubectl exec로 디스크 사용량 확인 (du -sh /path). 2. 오래된 로그 정리. 3. 불필요한 파일 삭제. 4. PV 용량 증설. 5. 적절한 retention policy 설정"
    patterns: ["DiskFull"]
    source: "https://kubernetes.io/docs/concepts/storage/persistent-volumes/"

  - title: "Timeout - 느린 응답 시간"
    cause: "Pod의 애플리케이션이 요청을 처리하는 데 너무 오래 걸림. 원인: CPU 병목, 과부하, DB 응답 지연, 네트워크 레이턴시"
    resolution: "1. kubectl top pod으로 CPU/메모리 사용량 확인. 2. 애플리케이션 프로파일링 (로그, 메트릭 분석). 3. 의존하는 외부 서비스(DB, API) 응답 시간 확인. 4. Pod 리소스 증설 또는 horizontalPodAutoscaler 설정"
    patterns: ["SlowLatency"]
    source: "https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/"

  - title: "Init 컨테이너 실패"
    cause: "initContainer의 작업(데이터 준비, 마운트, 권한 설정 등)이 실패"
    resolution: "1. kubectl describe pod의 initContainers 섹션 확인. 2. kubectl logs <pod> -c <init-container>로 초기화 로그 확인. 3. 의존성(ConfigMap, Secret, PV 권한) 검증. 4. 초기화 스크립트 수정 후 재배포"
    patterns: ["CrashLoop", "ErrorSpike"]
    source: "https://kubernetes.io/docs/concepts/workloads/pods/init-containers/"

  - title: "Liveliness Probe 실패"
    cause: "livenessProbe가 실패하여 kubectl이 Pod을 unhealthy로 판단하고 재시작"
    resolution: "1. kubectl logs로 probe가 접근하는 엔드포인트의 응답 확인. 2. 엔드포인트 경로, 포트, 프로토콜 검증. 3. 응답 지연으로 인한 경우 initialDelaySeconds 증가. 4. probe 로직 조정 필요"
    patterns: ["CrashLoop", "ErrorSpike"]
    source: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/"

  - title: "Service 엔드포인트 없음"
    cause: "Service의 selector로 매칭되는 Pod이 없거나 모든 Pod이 unhealthy"
    resolution: "1. kubectl get endpoints로 엔드포인트 확인. 2. Service의 selector 검증. 3. Pod의 label 확인 (kubectl get pod --show-labels). 4. readinessProbe 상태 확인. 5. label 재설정 또는 readinessProbe 로직 수정"
    patterns: ["ErrorSpike"]
    source: "https://kubernetes.io/docs/concepts/services-networking/service/"

  - title: "메모리 누수 - 지속적 메모리 증가"
    cause: "애플리케이션의 메모리 누수로 인한 점진적 메모리 사용량 증가, 결국 OOMKilled로 종료"
    resolution: "1. 일정 기간 메모리 사용 추세 모니터링 (Prometheus/Grafana). 2. 힙 덤프 생성 (jvm의 경우). 3. 메모리 프로파일링 도구 사용. 4. 누수 원인 코드 찾아 수정. 5. 정기적 Pod 재시작 (워크어라운드)"
    patterns: ["OOMKilled", "ErrorSpike"]
    source: "https://kubernetes.io/docs/tasks/debug/debug-application/debug-memory-cpu-container/"

  - title: "네트워크 연결 실패"
    cause: "Pod이 외부 또는 다른 Pod과 네트워크 통신 불가. 원인: DNS 실패, NetworkPolicy 차단, 방화벽, 네트워크 설정 오류"
    resolution: "1. kubectl exec로 ping/nslookup 테스트. 2. DNS 해석 확인 (nslookup <service>). 3. NetworkPolicy 규칙 검증. 4. 노드의 방화벽 규칙 확인. 5. 서비스 discovery 메커니즘 재확인"
    patterns: ["ErrorSpike", "SlowLatency"]
    source: "https://kubernetes.io/docs/concepts/services-networking/networkpolicies/"
