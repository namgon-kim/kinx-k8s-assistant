  - id: iksv2-renew-service-loadbalancer
    title: "IKS v2 Workload Service LoadBalancer"
    symptoms:
      - "Workload Service LoadBalancer creation, update, or deletion is not synchronized"
      - "Service has no LB ID annotation"
      - "OpenStack load balancer is pending or in error"
      - "Service deletion is stuck on load balancer cleanup"
    evidence_keywords:
      - "Service"
      - "LoadBalancer"
      - "tenant.meta.x-k8s.io/id"
      - "cluster.meta.x-k8s.io/name"
      - "service.beta.kubernetes.io/kinx-load-balancer-id"
      - "cluster.x-k8s.io.ew/resource-id"
      - "service.kubernetes.io/load-balancer-cleanup"
      - "PENDING_CREATE"
      - "PENDING_UPDATE"
      - "PENDING_DELETE"
      - "ACTIVE"
      - "ERROR"
      - "resource-create-completed"
      - "resource-update-completed"
      - "resource-delete-completed"
    cause: "Workload Service LB state is synchronized from Kubernetes Service annotations and external OpenStack LB provisioning state."
    resolution: "Confirm the Service is a managed workload LoadBalancer, then compare Service annotations, deletionTimestamp/finalizers, and OpenStack LB provisioning status."
    decision_hints:
      - "Missing LB ID annotation means LB creation may still be pending."
      - "OpenStack ACTIVE permits create/update completion synchronization."
      - "OpenStack ERROR indicates LB-side failure."
      - "Service deletion completes only after load-balancer-cleanup finalizer is gone and external LB is deleted or not found."
      - "Service metadata uses tenant.meta.x-k8s.io/id and cluster.meta.x-k8s.io/name annotations, so label selectors may not find the object."
      - "This command must run against the workload cluster context, not the management cluster context."
    related_objects:
      - Service
      - OpenStackLoadBalancer
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect workload LoadBalancer Services for the cluster"
        command_template: "kubectl --context {{workload_context}} get service --all-namespaces -o yaml"
        automatic_candidate: false
        requires_confirmation: false
      - type: diagnostic
        description: "Inspect event-watcher logs for workload Service synchronization"
        command_template: "kubectl logs -n dev-k8saas deploy/k8saas-cluster-api-manager-event-watcher | grep {{cluster_name}} | grep Service"
        automatic_candidate: true
        requires_confirmation: false
    risk_level: medium
    source: "iksv2-renew-state-guide"
    tags: ["iksv2", "service", "loadbalancer", "openstack", "workload-resource"]

  - id: iksv2-renew-persistentvolume
    title: "IKS v2 Workload PersistentVolume"
    symptoms:
      - "PersistentVolume create, attach, detach, or delete is not synchronized"
      - "PV remains in unexpected phase"
      - "VolumeAttachment is not attached"
      - "PV deletion is blocked by finalizers"
    evidence_keywords:
      - "PersistentVolume"
      - "PersistentVolumeClaim"
      - "VolumeAttachment"
      - "cinder.csi.openstack.org"
      - "manila.csi.openstack.org"
      - "tenant.meta.x-k8s.io/id"
      - "cluster.meta.x-k8s.io/name"
      - "cluster.x-k8s.io.ew/resource-id"
      - "resource-create-completed"
      - "resource-attach-completed"
      - "resource-detach-completed"
      - "resource-delete-completed"
      - "kubernetes.io/pv-protection"
      - "Retain"
    cause: "PV synchronization is primarily handled by event-watcher soot PersistentVolume controller using CSI driver, PV phase, VolumeAttachment attached state, deletionTimestamp, protection finalizers, and external volume metadata. Event-processor only participates in cluster deletion cleanup for persisted PV OpenStack resource metadata."
    resolution: "Check whether the PV belongs to the workload cluster, inspect CSI driver and volume handle, compare PV phase with VolumeAttachment status, and verify finalizer removal on deletion. PV inspection requires workload cluster kubeconfig/context from {{cluster_name}}-admin-kubeconfig Secret data admin.conf, so direct command execution is intentionally disabled here."
    decision_hints:
      - "Cinder and Manila CSI PVs are managed resources when tenant/cluster metadata connects them to the root cluster."
      - "PV phase Available or Bound with a CSI volume handle means volume creation can be synchronized."
      - "VolumeAttachment.status.attached=true means attach completion can be synchronized."
      - "Released phase is detach evidence."
      - "PV deletion requires pv-protection finalizer removal before delete completion synchronization."
      - "PersistentVolume is a workload cluster resource. Do not run PV inspection against the management cluster context."
      - "Prepare {{workload_context}} from {{cluster_name}}-admin-kubeconfig Secret data admin.conf first, then inspect PV/PVC/VolumeAttachment in that context."
      - "Use event-watcher logs for normal PV create/attach/detach/delete synchronization."
      - "Use event-processor logs only when diagnosing cluster deletion cleanup for remaining PV OpenStack resource metadata."
    related_objects:
      - PersistentVolume
      - PersistentVolumeClaim
      - VolumeAttachment
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect event-watcher logs for PV synchronization"
        command_template: "kubectl logs -n dev-k8saas deploy/k8saas-cluster-api-manager-event-watcher | grep {{cluster_name}} | grep -E 'PersistentVolume|VolumeAttachment'"
        automatic_candidate: true
        requires_confirmation: false
    # PersistentVolume 진단은 workload cluster kubeconfig/context가 필요하므로 자동 실행 명령을 비활성화한다.
    # kubeconfig를 {{cluster_name}}-admin-kubeconfig Secret의 admin.conf에서 추출해 {{workload_context}}를 준비한 뒤, 필요 시 아래 명령을 수동으로 사용한다.
    # - kubectl --context {{workload_context}} get persistentvolume -o yaml
    # - kubectl --context {{workload_context}} get persistentvolumeclaim --all-namespaces -o yaml
    # - kubectl --context {{workload_context}} get volumeattachment -o yaml
    risk_level: medium
    source: "iksv2-renew-state-guide"
    tags: ["iksv2", "persistentvolume", "volumeattachment", "csi", "workload-resource"]

  - id: iksv2-renew-cluster-deletion
    title: "IKS v2 Cluster Deletion and Cleanup"
    symptoms:
      - "Cluster deletion is stuck"
      - "Cluster delete failed annotation is present"
      - "Addon, Ingress, ServiceGatewayClaim, Secret, or finalizer remains"
      - "event-processor cleanup has not removed its finalizer"
    evidence_keywords:
      - "deletionTimestamp"
      - "cluster-delete-started"
      - "cluster-delete-completed"
      - "cluster-delete-failed"
      - "cluster.x-k8s.io/paused"
      - "cluster.x-k8s.io.ew/paused"
      - "HelmRelease"
      - "HelmChartProxy"
      - "HelmReleaseProxy"
      - "Ingress"
      - "ServiceGatewayClaim"
      - "cloud-conf"
      - "ccm-cloud-config"
      - "admin-kubeconfig"
      - "finalizers"
    cause: "Cluster deletion completion requires more than deletionTimestamp; watcher checks child resource absence and finalizer removal, while processor handles external resource and credential cleanup."
    resolution: "Inspect deletionTimestamp, addon resources, same-name Ingress, CAPI and processor finalizers, cloud-conf Secret, ServiceGatewayClaim, and delete annotations."
    decision_hints:
      - "HelmRelease, HelmChartProxy, or Ingress remaining prevents deletion completion."
      - "CAPI cluster finalizer remaining means CAPI cleanup is still pending."
      - "Processor cleanup should not start while finalizers other than event-processor finalizer remain."
      - "cluster-delete-failed=true with pause annotations indicates watcher timeout failure."
    related_objects:
      - Cluster
      - HelmRelease
      - HelmChartProxy
      - HelmReleaseProxy
      - Ingress
      - ServiceGatewayClaim
      - Secret
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect Cluster deletion state"
        command_template: "kubectl -n {{namespace}} get cluster {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
      - type: diagnostic
        description: "Inspect resources that block cluster delete completion"
        command_template: "kubectl -n {{namespace}} get helmrelease,helmchartproxy,helmreleaseproxy -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
      - type: diagnostic
        description: "Inspect same-name Ingress, cloud config Secrets, and kubeconfig Secret that may block cluster delete completion"
        command_template: "kubectl -n {{namespace}} get ingress/{{cluster_name}} secret/{{cluster_name}}-cloud-conf secret/{{cluster_name}}-ccm-cloud-config secret/{{cluster_name}}-admin-kubeconfig -o yaml"
        automatic_candidate: true
        requires_confirmation: false
      - type: diagnostic
        description: "Inspect ServiceGatewayClaims for processor cleanup"
        command_template: "kubectl -n {{namespace}} get servicegatewayclaim -l iksv2.kinx.net/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
      - type: diagnostic
        description: "Inspect processor cleanup logs"
        command_template: "kubectl logs -n dev-k8saas deploy/k8saas-cluster-api-manager-event-processor | grep {{cluster_name}}"
        automatic_candidate: true
        requires_confirmation: false
    risk_level: medium
    source: "iksv2-renew-state-guide"
    tags: ["iksv2", "cluster", "deletion", "cleanup", "finalizer"]

  - id: iksv2-renew-nodegroup-deletion
    title: "IKS v2 NodeGroup Deletion"
    symptoms:
      - "Node group deletion is stuck"
      - "MachineDeployment deletionTimestamp is present"
      - "MachineSet, Machine, or OpenStackMachine remains"
      - "nodegroup-delete-failed annotation is present"
    evidence_keywords:
      - "MachineDeployment"
      - "MachineSet"
      - "Machine"
      - "OpenStackMachine"
      - "deletionTimestamp"
      - "MachineDeploymentFinalizer"
      - "nodegroup-delete-completed"
      - "nodegroup-delete-failed"
      - "cluster.x-k8s.io/paused"
    cause: "Node group deletion requires unpausing MachineDeployment, deleting child resources through CAPI/CAPO, and removing the MachineDeployment finalizer."
    resolution: "Inspect MachineDeployment deletion state, pause annotation removal, child resource cleanup, delete annotations, and finalizers."
    decision_hints:
      - "Paused MachineDeployment may need unpause before deletion can progress, but do not execute mutation in read-only mode."
      - "MachineSet, Machine, or OpenStackMachine remaining means child cleanup is still in progress."
      - "Deletion is complete only after the CAPI MachineDeploymentFinalizer is gone."
    related_objects:
      - MachineDeployment
      - MachineSet
      - Machine
      - OpenStackMachine
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect node group deletion hierarchy"
        command_template: "kubectl -n {{namespace}} get machinedeployment,machineset,machine,openstackmachine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
    risk_level: medium
    source: "iksv2-renew-state-guide"
    tags: ["iksv2", "nodegroup", "deletion", "finalizer"]

  - id: iksv2-renew-soot-manager-workload-observation
    title: "IKS v2 Soot Manager and Workload Cluster Observation"
    symptoms:
      - "Workload resources are not observed or synchronized"
      - "Remote watcher registration appears missing"
      - "Webhook labels or CA bundles are not corrected"
      - "Workload cluster cache connection errors occur"
    evidence_keywords:
      - "soot-manager-start-completed"
      - "soot manager"
      - "workload watcher"
      - "cluster cache"
      - "remote client"
      - "ValidatingWebhookConfiguration"
      - "MutatingWebhookConfiguration"
      - "cluster.x-k8s.io/cluster-name"
      - "headless service"
    cause: "Workload resource synchronization depends on root cluster access, remote client/cache availability, watcher registration, and webhook/service correction."
    resolution: "Check root Cluster state, deletionTimestamp, event-watcher logs, cluster cache connection errors, and workload webhook/service correction evidence."
    decision_hints:
      - "Remote client connection error means workload resource observation may be missing even if management-cluster CRDs look healthy."
      - "Cluster deletion should terminate workload watcher context and remove soot manager finalizer."
      - "Do not infer workload node or workload resource state from management-cluster node listing."
    related_objects:
      - Cluster
      - ValidatingWebhookConfiguration
      - MutatingWebhookConfiguration
      - Service
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect event-watcher logs for workload observation"
        command_template: "kubectl logs -n dev-k8saas deploy/k8saas-cluster-api-manager-event-watcher | grep {{cluster_name}} | grep -E 'soot|workload|cache|remote|webhook'"
        automatic_candidate: true
        requires_confirmation: false
      - type: diagnostic
        description: "Inspect Cluster metadata related to workload observation"
        command_template: "kubectl -n {{namespace}} get cluster {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
    risk_level: medium
    source: "iksv2-renew-state-guide"
    tags: ["iksv2", "soot-manager", "workload", "event-watcher", "webhook"]

  - id: iksv2-renew-log-analysis
    title: "IKS v2 Controller Log Analysis"
    symptoms:
      - "Kubernetes object state is ambiguous"
      - "Controller-created child resource is missing"
      - "Watcher or processor synchronization appears delayed"
      - "Cleanup or lifecycle operation is stuck"
    evidence_keywords:
      - "event-watcher"
      - "event-processor"
      - "api-manager"
      - "caaph-controller-manager"
      - "capi-controller-manager"
      - "capo-controller-manager"
      - "capi-kamaji-controller-manager"
      - "ERROR"
      - "cluster key"
      - "controller logs"
    cause: "Controller logs are needed when Kubernetes resource state identifies the responsible controller but not the internal reason for reconciliation delay."
    resolution: "Filter logs by cluster name or cluster key first, compare watcher and processor time windows, and inspect the controller responsible for the missing or stalled child resource."
    decision_hints:
      - "Do not search only for generic error strings without cluster key filtering."
      - "Watcher logs may show observation only; processor logs are needed for actual lifecycle actions."
      - "If a child resource is missing, inspect the controller responsible for creating that child resource."
      - "If processor cleanup is delayed, inspect finalizers and external resource state alongside processor logs."
    related_objects:
      - Cluster
      - MachineDeployment
      - Machine
      - HelmReleaseProxy
      - TenantControlPlane
      - ServiceGatewayClaim
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect event-watcher logs for the cluster"
        command_template: "kubectl logs -n dev-k8saas deploy/k8saas-cluster-api-manager-event-watcher | grep {{cluster_name}}"
        automatic_candidate: true
        requires_confirmation: false
      - type: diagnostic
        description: "Inspect event-processor logs for the cluster"
        command_template: "kubectl logs -n dev-k8saas deploy/k8saas-cluster-api-manager-event-processor | grep {{cluster_name}}"
        automatic_candidate: true
        requires_confirmation: false
      - type: diagnostic
        description: "Inspect event-processor errors for the cluster"
        command_template: "kubectl logs -n dev-k8saas deploy/k8saas-cluster-api-manager-event-processor | grep {{cluster_name}} | grep ERROR"
        automatic_candidate: true
        requires_confirmation: false
    risk_level: low
    source: "iksv2-renew-state-guide"
    tags: ["iksv2", "logs", "controller", "event-watcher", "event-processor"]
