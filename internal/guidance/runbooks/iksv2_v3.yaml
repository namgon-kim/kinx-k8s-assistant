schema:
  placeholder_policy:
    - "{{namespace}}: management cluster에서 tenant/cluster 리소스가 생성되는 namespace. 값이 확실하지 않으면 먼저 all-namespaces field selector로 찾는다."
    - "{{cluster_name}}: IKS v2 Cluster 리소스 이름."
    - "{{machine_deployment_name}} 같은 단일 하위 리소스 이름은 requirement_analysis 후속 요청에서 새 primary target으로 확정된 경우에만 사용한다. Cluster 범위 guide step에서는 label selector를 사용한다."
    - "workload context는 현재 ReAct guide step 렌더링 대상이 아니므로 diagnostic_steps에 직접 넣지 않는다. workload 리소스는 kubeconfig Secret 존재를 확인한 뒤 사용자에게 별도 확인을 안내한다."
  diagnostic_policy:
    - "문제가 발생했을 때는 primary CRD의 metadata/spec/status/conditions를 첫 관측으로 삼는다."
    - "처음부터 Pod 목록, Node 목록, events, controller logs로 넓히지 않는다. CRD status와 lifecycle이 다음 검색 방향을 결정한다."
    - "Cluster가 deleting이면 생성 failureMessage보다 deletionTimestamp, pause, child 잔존, finalizer, delete annotation을 먼저 추적한다."
    - "문제 리소스는 증상 집계 리소스와 blocker 후보 리소스를 구분한다. Cluster가 증상을 보고해도 실제 blocker는 MachineDeployment, Machine, OpenStackMachine, addon, finalizer일 수 있다."
    - "automatic_candidate=true 명령은 read-only kubectl 조회만 포함한다. controller logs는 CRD로 막힌 계층을 좁힌 뒤 수동 보조 증거로만 사용한다."
    - "workload cluster 내부 Service/PersistentVolume 진단은 workload kubeconfig/context가 준비된 뒤에만 실행한다."

cases:
  - id: iksv2-v3-cluster-issue-entrypoint
    title: "IKS v2 Cluster Issue Trace Entrypoint"
    symptoms:
      - "A user asks what is wrong with a specific IKS v2 Cluster"
      - "Cluster health, availability, creation, or deletion state is unclear"
      - "The request names a Cluster but does not yet identify the failing layer"
    evidence_keywords:
      - "Cluster"
      - "metadata.deletionTimestamp"
      - "status.conditions"
      - "InfrastructureReady"
      - "ControlPlaneReady"
      - "WorkersAvailable"
      - "Available"
      - "Ready"
      - "failureReason"
      - "failureMessage"
      - "finalizers"
      - "cluster-create-failed"
      - "cluster-delete-failed"
      - "cluster.x-k8s.io/paused"
      - "cluster.x-k8s.io.ew/paused"
    cause: "Cluster is an aggregate symptom surface. The first task is to determine the current lifecycle and the first related layer that contradicts the expected state."
    resolution: "Inspect only the Cluster object first, classify lifecycle as creating, running-health, deleting, suspend, resume, scale, or upgrade, then select a more specific guide for the failing layer."
    decision_hints:
      - "If metadata.deletionTimestamp exists, switch to deletion blocker tracing before interpreting old create failure messages."
      - "If WorkersAvailable=False, do not stop at the Cluster. Trace MachineDeployment, MachineSet, Machine, OpenStackMachine, and Node registration evidence."
      - "If InfrastructureReady=False or OpenStack failureMessage exists and the Cluster is not deleting, trace OpenStackCluster."
      - "If ControlPlaneReady=False, trace KamajiControlPlane and TenantControlPlane."
      - "If pause annotations exist, explain whether pause blocks reconcile in the current lifecycle."
      - "Use create/delete annotations as lifecycle synchronization evidence, not as standalone root cause."
      - "Do not use management-cluster kubectl get nodes or pods as the first observation for a Cluster CRD problem."
    related_objects:
      - Cluster
      - OpenStackCluster
      - KamajiControlPlane
      - TenantControlPlane
      - MachineDeployment
      - Machine
      - OpenStackMachine
      - HelmReleaseProxy
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect the primary Cluster object and classify lifecycle"
        command_template: "kubectl -n {{namespace}} get cluster {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Cluster metadata, deletionTimestamp, finalizers, annotations, spec, status, conditions, failureReason, and failureMessage are available for lifecycle classification."
      - type: diagnostic
        description: "Find Cluster namespace when namespace is unknown"
        command_template: "kubectl get cluster -A --field-selector metadata.name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        preconditions:
          - "{{namespace}} is empty or uncertain"
        expected_outcome: "The Cluster namespace is identified without using invalid positional name plus --all-namespaces lookup."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "cluster", "entrypoint", "lifecycle", "issue-tracing", "crd-first"]

  - id: iksv2-v3-cluster-deletion-blocker-trace
    title: "IKS v2 Cluster Deletion Blocker Trace"
    symptoms:
      - "Cluster has deletionTimestamp"
      - "Cluster deletion is stuck or delete failed"
      - "Cluster is Deleting but previous create failureMessage is still visible"
      - "Addon, worker, control-plane, infra, Secret, ServiceGatewayClaim, or finalizer remains during deletion"
    evidence_keywords:
      - "deletionTimestamp"
      - "cluster-delete-started"
      - "cluster-delete-completed"
      - "cluster-delete-failed"
      - "cluster-create-failed"
      - "failureMessage"
      - "finalizers"
      - "cluster.x-k8s.io/paused"
      - "cluster.x-k8s.io.ew/paused"
      - "HelmRelease"
      - "HelmChartProxy"
      - "HelmReleaseProxy"
      - "Ingress"
      - "MachineDeployment"
      - "MachineSet"
      - "Machine"
      - "OpenStackMachine"
      - "InstanceDeleteFailed"
      - "KamajiControlPlane"
      - "TenantControlPlane"
      - "OpenStackCluster"
      - "ServiceGatewayClaim"
      - "cloud-conf"
      - "admin-kubeconfig"
    cause: "Cluster deletion completes only after child resources and finalizers are cleared. Historical create failure messages can remain on a deleting Cluster and must not be treated as the current deletion cause without delete-specific evidence."
    resolution: "Trace deletion blockers in order: pause and finalizers, addon/Ingress remnants, worker hierarchy, control plane, OpenStackCluster, credential Secrets, and ServiceGatewayClaim cleanup."
    decision_hints:
      - "When deletionTimestamp exists, current diagnosis is deletion lifecycle even if failureMessage mentions quota or creation."
      - "cluster-delete-failed=true is a current deletion failure signal; cluster-create-failed=true may be historical."
      - "If paused annotations remain with deletionTimestamp, CAPI or IKS reconcile may not progress."
      - "HelmRelease, HelmChartProxy, HelmReleaseProxy, or same-name Ingress remaining can prevent delete completion."
      - "Machine/OpenStackMachine remaining shifts the problem resource candidate away from Cluster to the worker or infra child."
      - "OpenStackMachine InstanceDeleteFailed is delete-specific evidence and should be prioritized over old OpenStackCluster create messages."
      - "If only event-processor finalizer remains, suspect external cleanup such as credentials, ServiceGatewayClaim, LB, or PV metadata."
      - "Report both symptom resource and blocker candidate. Do not list Cluster as the sole problem resource when a child blocker is present."
    related_objects:
      - Cluster
      - HelmRelease
      - HelmChartProxy
      - HelmReleaseProxy
      - Ingress
      - MachineDeployment
      - MachineSet
      - Machine
      - OpenStackMachine
      - KamajiControlPlane
      - TenantControlPlane
      - OpenStackCluster
      - Secret
      - ServiceGatewayClaim
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect Cluster deletion metadata, finalizers, and delete annotations"
        command_template: "kubectl -n {{namespace}} get cluster {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "DeletionTimestamp, pause state, finalizers, create/delete annotations, and current failure messages are available."
      - type: diagnostic
        description: "Inspect addon and same-name Ingress deletion blockers"
        command_template: "kubectl -n {{namespace}} get helmrelease,helmchartproxy,helmreleaseproxy,ingress -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Addon and ingress remnants are identified. If same-name Ingress is not labeled, inspect it separately."
      - type: diagnostic
        description: "Inspect same-name Ingress when label selector does not prove absence"
        command_template: "kubectl -n {{namespace}} get ingress {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Same-name Ingress existence or absence is confirmed."
      - type: diagnostic
        description: "Inspect worker hierarchy remaining during deletion"
        command_template: "kubectl -n {{namespace}} get machinedeployment,machineset,machine,openstackmachine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Remaining worker resources, deletionTimestamp, finalizers, and OpenStackMachine delete failure reasons are visible."
      - type: diagnostic
        description: "Inspect control-plane and infra children remaining during deletion"
        command_template: "kubectl -n {{namespace}} get kamajicontrolplane/{{cluster_name}} tenantcontrolplane/{{cluster_name}} openstackcluster/{{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Remaining hosted control plane and infra resources are identified."
      - type: diagnostic
        description: "Inspect credential Secrets that may remain during cleanup"
        command_template: "kubectl -n {{namespace}} get secret/{{cluster_name}}-cloud-conf secret/{{cluster_name}}-ccm-cloud-config secret/{{cluster_name}}-admin-kubeconfig -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Credential Secret cleanup candidates are identified."
      - type: diagnostic
        description: "Inspect ServiceGatewayClaim cleanup targets"
        command_template: "kubectl -n {{namespace}} get servicegatewayclaim -l iksv2.kinx.net/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "ServiceGatewayClaim cleanup candidates are identified."
    risk_level: medium
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "cluster", "deletion", "cleanup", "finalizer", "blocker", "issue-tracing"]

  - id: iksv2-v3-cluster-creation-trace
    title: "IKS v2 Cluster Creation and Top-Level Resource Trace"
    symptoms:
      - "Cluster creation is stuck or incomplete"
      - "InfrastructureReady or ControlPlaneReady is False"
      - "OpenStackCluster or KamajiControlPlane is missing"
      - "Initial deployment did not complete"
    evidence_keywords:
      - "cluster-create-started"
      - "cluster-create-completed"
      - "cluster-create-failed"
      - "initial-deployment"
      - "initial-deployment-completed"
      - "initial-deployment-paused"
      - "OpenStackCluster"
      - "KamajiControlPlane"
      - "TenantControlPlane"
      - "InfrastructureReady"
      - "ControlPlaneReady"
      - "cloud-conf"
      - "ccm-cloud-config"
      - "Quota exceeded"
      - "No valid host"
      - "security_group"
    cause: "Cluster creation starts from top-level CAPI/CAPO/Kamaji resources. Missing child resources must be interpreted only after confirming parent resources, annotations, and current lifecycle."
    resolution: "Inspect Cluster, OpenStackCluster, KamajiControlPlane, TenantControlPlane, and initial deployment markers, then branch to infra, control-plane, addon, or worker guides."
    decision_hints:
      - "OpenStackCluster missing means api-manager creation or parent resource issue, unless deletion is already in progress."
      - "InfrastructureReady=False with OpenStackCluster failureMessage points to CAPO/OpenStack infrastructure."
      - "ControlPlaneReady=False with KCP present requires TenantControlPlane inspection."
      - "initial-deployment-completed=false plus cluster-create-failed=true means watcher recorded initial deployment failure."
      - "initial-deployment-paused=true means cleanup/pause handling may be active."
      - "Do not diagnose node group or addon before confirming top-level resource readiness."
    related_objects:
      - Cluster
      - OpenStackCluster
      - KamajiControlPlane
      - TenantControlPlane
      - Secret
      - MachineDeployment
      - HelmReleaseProxy
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect top-level Cluster creation resources"
        command_template: "kubectl -n {{namespace}} get cluster/{{cluster_name}} openstackcluster/{{cluster_name}} kamajicontrolplane/{{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Top-level resources, owner references, creation annotations, and status conditions are visible."
      - type: diagnostic
        description: "Inspect TenantControlPlane generated by Kamaji"
        command_template: "kubectl -n {{namespace}} get tenantcontrolplane {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Tenant control plane existence and version/status are visible."
      - type: diagnostic
        description: "Inspect cloud config Secrets needed by hosted control plane and CCM"
        command_template: "kubectl -n {{namespace}} get secret/{{cluster_name}}-cloud-conf secret/{{cluster_name}}-ccm-cloud-config -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Required cloud config Secret presence is confirmed."
      - type: diagnostic
        description: "Inspect initial deployment node group and addon resources"
        command_template: "kubectl -n {{namespace}} get machinedeployment,helmrelease,helmchartproxy,helmreleaseproxy -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Initial worker and addon resources are present or their absence is confirmed after top-level readiness."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "cluster", "creation", "top-level", "initial-deployment", "issue-tracing"]

  - id: iksv2-v3-openstack-infrastructure-trace
    title: "IKS v2 OpenStack Infrastructure Failure Trace"
    symptoms:
      - "InfrastructureReady is False"
      - "OpenStackCluster has failureReason or failureMessage"
      - "OpenStackMachine InstanceReady is False"
      - "Quota, capacity, security group, network, router, or load balancer error is reported"
    evidence_keywords:
      - "OpenStackCluster"
      - "OpenStackMachine"
      - "InfrastructureReady"
      - "InstanceReady"
      - "failureReason"
      - "failureMessage"
      - "Quota exceeded"
      - "No valid host"
      - "security_group"
      - "network"
      - "port"
      - "router"
      - "LoadBalancer"
      - "Unauthorized"
      - "Forbidden"
      - "providerID"
    cause: "OpenStack problems are inferred from CAPO CRD status and conditions when direct OpenStack API access is not available."
    resolution: "Use OpenStackCluster and OpenStackMachine status to determine whether infra, VM create, VM delete, or cloud credential reconciliation is blocking the operation."
    decision_hints:
      - "Quota exceeded is a strong creation failure signal only when the current lifecycle is creation or infra provisioning."
      - "If the Cluster is deleting, quota messages may be historical. Look for delete-specific signals such as InstanceDeleteFailed and remaining finalizers."
      - "OpenStackCluster.ready=false or failureMessage points to cluster-level infra."
      - "OpenStackMachine.InstanceReady=False points to VM-level infra."
      - "Machine.spec.providerID present means the VM likely exists; then node join or Node health should be checked."
      - "Do not execute OpenStack CLI commands from this runbook. Keep evidence to Kubernetes CRD status."
    related_objects:
      - OpenStackCluster
      - OpenStackMachine
      - Machine
      - Cluster
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect OpenStackCluster infra status"
        command_template: "kubectl -n {{namespace}} get openstackcluster {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Cluster-level OpenStack readiness, generated fields, failureReason, and failureMessage are visible."
      - type: diagnostic
        description: "Inspect OpenStackMachine resources for VM-level status"
        command_template: "kubectl -n {{namespace}} get openstackmachine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "VM-level InstanceReady conditions, provider IDs, failure messages, and deletion state are visible."
      - type: diagnostic
        description: "Inspect Machines alongside OpenStackMachines"
        command_template: "kubectl -n {{namespace}} get machine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Machine providerID/nodeRef/conditions can be compared with OpenStackMachine status."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "openstack", "capo", "infrastructure", "failuremessage", "issue-tracing"]

  - id: iksv2-v3-hosted-control-plane-trace
    title: "IKS v2 Hosted Control Plane Readiness Trace"
    symptoms:
      - "ControlPlaneReady is False"
      - "KamajiControlPlane exists but TenantControlPlane is missing"
      - "Tenant control plane version status is NotReady or Provisioning"
      - "Hosted control plane replicas are not ready"
    evidence_keywords:
      - "ControlPlaneReady"
      - "KamajiControlPlane"
      - "TenantControlPlane"
      - "readyReplicas"
      - "spec.replicas"
      - "version.status"
      - "kubeconfig"
      - "admin-kubeconfig"
    cause: "Hosted control plane readiness is derived from KamajiControlPlane and TenantControlPlane status rather than workload node state."
    resolution: "Inspect KCP and TCP status, ready replica convergence, tenant version state, and kubeconfig Secret presence before attributing failures to workers or addons."
    decision_hints:
      - "KCP exists but TCP is missing means Kamaji provider child creation is the next focus."
      - "KCP readyReplicas below spec.replicas means hosted control plane pod readiness is not converged."
      - "TCP version.status Provisioning or NotReady means tenant API server is not ready."
      - "Missing admin kubeconfig Secret can explain downstream workload observation failures."
      - "Do not use management-cluster Node status as evidence for tenant control plane readiness."
    related_objects:
      - Cluster
      - KamajiControlPlane
      - TenantControlPlane
      - Secret
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect hosted control plane resources"
        command_template: "kubectl -n {{namespace}} get kamajicontrolplane/{{cluster_name}} tenantcontrolplane/{{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "KCP/TCP existence, replicas, conditions, and version status are visible."
      - type: diagnostic
        description: "Inspect admin kubeconfig Secret"
        command_template: "kubectl -n {{namespace}} get secret {{cluster_name}}-admin-kubeconfig -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Tenant kubeconfig Secret existence is confirmed."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "control-plane", "kamaji", "tenantcontrolplane", "issue-tracing"]

  - id: iksv2-v3-worker-group-trace
    title: "IKS v2 Worker Group and MachineDeployment Trace"
    symptoms:
      - "WorkersAvailable is False"
      - "Node group, worker group, or MachineDeployment is not working"
      - "MachineDeployment has zero available replicas"
      - "Machine waits for Node or providerID"
      - "Worker creation, scale, or upgrade is stuck"
    evidence_keywords:
      - "WorkersAvailable"
      - "MachineDeployment"
      - "MachineSet"
      - "Machine"
      - "OpenStackMachine"
      - "availableReplicas"
      - "readyReplicas"
      - "updatedReplicas"
      - "spec.replicas"
      - "ScalingUp"
      - "ScalingDown"
      - "providerID"
      - "nodeRef"
      - "BootstrapReady"
      - "InfrastructureReady"
      - "NodeHealthy"
      - "nodegroup-create-failed"
      - "nodegroup-scale-failed"
      - "nodegroup-upgrade-in-progress"
      - "nodegroup-upgrade-failed"
    cause: "Worker availability is a chain problem across MachineDeployment, MachineSet, Machine, OpenStackMachine, and Node registration."
    resolution: "Trace the worker hierarchy from MachineDeployment to Node evidence and stop at the first layer where expected child or readiness evidence is missing."
    decision_hints:
      - "Node group is an operational focus. In CAPI context it usually maps to the worker hierarchy, but do not rewrite the user target without evidence."
      - "MachineDeployment exists but MachineSet is missing points to CAPI rollout."
      - "MachineSet exists but Machine is missing points to replica expansion."
      - "Machine exists but OpenStackMachine is missing points to CAPO child creation."
      - "OpenStackMachine InstanceReady=False points to VM create/delete failure."
      - "Machine providerID exists but nodeRef is missing means VM exists but Node did not join."
      - "nodeRef exists but NodeHealthy=False means Node condition, CNI, or kubelet-level issue."
      - "When the Cluster only reports WorkersAvailable=False, propose the first failing worker child as the problem resource candidate."
    related_objects:
      - Cluster
      - MachineDeployment
      - MachineSet
      - Machine
      - OpenStackMachine
      - Node
      - OpenStackMachineTemplate
      - KubeadmConfigTemplate
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect worker rollout hierarchy"
        command_template: "kubectl -n {{namespace}} get machinedeployment,machineset,machine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "MachineDeployment replica status, MachineSet creation, Machine conditions, and rollout markers are visible."
      - type: diagnostic
        description: "Inspect VM-level worker infrastructure"
        command_template: "kubectl -n {{namespace}} get openstackmachine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "OpenStackMachine InstanceReady, failure messages, provider IDs, and deletion state are visible."
      - type: diagnostic
        description: "Inspect Machine condition summaries for join and health classification"
        command_template: >-
          kubectl -n {{namespace}} get machine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o jsonpath='{range .items[*]}{.metadata.name}{" providerID="}{.spec.providerID}{" nodeRef="}{.status.nodeRef.name}{" phase="}{.status.phase}{"\n"}{range .status.conditions[*]}  {.type}={.status} reason={.reason} message={.message}{"\n"}{end}{end}'
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "providerID, nodeRef, phase, BootstrapReady, InfrastructureReady, and NodeHealthy signals are summarized."
      - type: diagnostic
        description: "Inspect templates involved in worker rollout or upgrade"
        command_template: "kubectl -n {{namespace}} get openstackmachinetemplate,kubeadmconfigtemplate -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Template references, image/version drift, and upgrade-related configuration can be compared with MachineDeployment state."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "nodegroup", "worker-group", "machinedeployment", "machine", "node-join", "issue-tracing"]

  - id: iksv2-v3-machine-provisioning-join-deletion-trace
    title: "IKS v2 Machine Provisioning, Join, Health, and Deletion Trace"
    symptoms:
      - "A specific Machine is not ready"
      - "Machine is waiting for providerID"
      - "Machine has providerID but no nodeRef"
      - "Machine has nodeRef but NodeHealthy is False"
      - "Machine deletion is stuck on drain, detach, or finalizer"
    evidence_keywords:
      - "Machine"
      - "OpenStackMachine"
      - "providerID"
      - "nodeRef"
      - "BootstrapReady"
      - "InfrastructureReady"
      - "NodeHealthy"
      - "HealthCheckSucceeded"
      - "OwnerRemediated"
      - "DrainingSucceeded"
      - "VolumeDetachSucceeded"
      - "MachineFinalizer"
      - "deletionTimestamp"
      - "InstanceReady"
      - "InstanceDeleteFailed"
    cause: "Machine state must be separated into VM provisioning, bootstrap data, Node join, Node health, remediation, and deletion cleanup."
    resolution: "Compare Machine conditions with paired OpenStackMachine conditions, then classify the failure as VM create, bootstrap, join, health, drain, detach, or infra delete."
    decision_hints:
      - "InfrastructureReady=False usually means infra or OpenStackMachine is not ready."
      - "BootstrapReady=False indicates bootstrap data or KubeadmConfig path."
      - "providerID present and nodeRef missing means the VM likely exists but did not join the tenant cluster."
      - "nodeRef present and NodeHealthy=False indicates post-join node condition failure."
      - "OwnerRemediated repeating means remediation loop; look for the original readiness failure."
      - "deletionTimestamp with DrainingSucceeded=False means drain is blocking."
      - "deletionTimestamp with VolumeDetachSucceeded=False means volume detach is blocking."
      - "OpenStackMachine InstanceDeleteFailed is delete-specific infra evidence."
    related_objects:
      - Machine
      - OpenStackMachine
      - Node
      - VolumeAttachment
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect all Machines and OpenStackMachines in the Cluster"
        command_template: "kubectl -n {{namespace}} get machine,openstackmachine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Machine/OpenStackMachine pairs can be identified by labels without guessing unsupported placeholder values."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "machine", "openstackmachine", "providerid", "noderef", "deletion", "issue-tracing"]

  - id: iksv2-v3-addon-rollout-trace
    title: "IKS v2 Addon and Helm Proxy Rollout Trace"
    symptoms:
      - "Addon readiness is incomplete"
      - "HelmChartProxy exists but HelmReleaseProxy is missing"
      - "HelmReleaseProxy Ready condition is False"
      - "HelmRelease is pending or install/upgrade failed"
      - "Initial deployment waits for addons"
    evidence_keywords:
