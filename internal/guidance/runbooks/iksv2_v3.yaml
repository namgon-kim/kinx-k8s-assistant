  - id: iksv2-v3-cluster-suspend-detail
    title: "IKS v2 Cluster Suspend Detail"
    symptoms:
      - "Cluster suspend is requested but not completed"
      - "operation-state remains suspend-requested or suspend-applied"
      - "Control plane, addon, or worker replicas have not scaled down"
      - "last-suspended-done is missing"
    evidence_keywords:
      - "suspend-requested"
      - "suspend-applied"
      - "last-suspended-done"
      - "operation-state"
      - "spec.replicas"
      - "readyReplicas"
      - "spec.suspend"
      - "cluster.x-k8s.io/paused"
      - "KamajiControlPlane"
      - "HelmRelease"
      - "MachineDeployment"
    cause: "Suspend is applied by event-processor and completes only after control plane, addons, and workers converge to suspended state."
    resolution: "Inspect operation-state, KCP replicas, HelmRelease suspend flags, worker replicas, pause annotation, and last-suspended-done."
    decision_hints:
      - "suspend-requested means processor has not applied the operation."
      - "suspend-applied means desired suspended state was applied but convergence is pending."
      - "KCP readyReplicas should converge to 0 during suspend."
      - "HelmRelease should be suspended when addon suspension is expected."
      - "CAPI pause may be expected after suspend but can block unrelated deletion if lifecycle changes."
    related_objects:
      - Cluster
      - KamajiControlPlane
      - HelmRelease
      - MachineDeployment
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect suspend operation metadata"
        command_template: "kubectl -n {{namespace}} get cluster {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "operation-state, pause, and last-suspended-done markers are visible."
      - type: diagnostic
        description: "Inspect suspend convergence for control plane and workers"
        command_template: "kubectl -n {{namespace}} get kamajicontrolplane,machinedeployment -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Control plane and worker replica convergence is visible."
      - type: diagnostic
        description: "Inspect addon suspend state"
        command_template: "kubectl -n {{namespace}} get helmrelease -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "HelmRelease suspend flags are visible."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "suspend", "operation-state", "detail", "issue-tracing"]

  - id: iksv2-v3-cluster-resume-detail
    title: "IKS v2 Cluster Resume Detail"
    symptoms:
      - "Cluster resume is requested but not completed"
      - "operation-state remains resume-requested or resume-applied"
      - "Control plane, addon, or worker replicas have not recovered"
      - "last-resumed-done is missing"
    evidence_keywords:
      - "resume-requested"
      - "resume-applied"
      - "last-suspended-done"
      - "last-resumed-done"
      - "operation-state"
      - "spec.replicas"
      - "readyReplicas"
      - "spec.suspend"
      - "cluster.x-k8s.io/paused"
      - "KamajiControlPlane"
      - "HelmRelease"
      - "MachineDeployment"
    cause: "Resume is applied only after a suspended state exists and completes when control plane, addons, and workers converge back to active state."
    resolution: "Inspect previous suspend marker, operation-state, pause removal, HelmRelease unsuspend, KCP readiness, worker readiness, and last-resumed-done."
    decision_hints:
      - "resume-requested without last-suspended-done is an abnormal sequence."
      - "resume-requested means processor has not applied resume."
      - "resume-applied means desired active state was applied but convergence is pending."
      - "KCP readyReplicas should recover to the expected active replica count."
      - "HelmRelease spec.suspend should be false when addon resume is expected."
      - "If workers do not recover, branch to worker group trace."
    related_objects:
      - Cluster
      - KamajiControlPlane
      - HelmRelease
      - MachineDeployment
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect resume operation metadata"
        command_template: "kubectl -n {{namespace}} get cluster {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "operation-state, last-suspended-done, last-resumed-done, and pause state are visible."
      - type: diagnostic
        description: "Inspect resume convergence for control plane and workers"
        command_template: "kubectl -n {{namespace}} get kamajicontrolplane,machinedeployment -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Control plane and worker readiness after resume is visible."
      - type: diagnostic
        description: "Inspect addon resume state"
        command_template: "kubectl -n {{namespace}} get helmrelease -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "HelmRelease unsuspend state is visible."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "resume", "operation-state", "detail", "issue-tracing"]

  - id: iksv2-v3-service-loadbalancer-detail
    title: "IKS v2 Workload Service LoadBalancer Detail"
    symptoms:
      - "Workload Service LoadBalancer creation is pending"
      - "Workload Service LoadBalancer update is stuck"
      - "OpenStack load balancer provisioning is ERROR"
      - "Service deletion is stuck on load balancer cleanup"
    evidence_keywords:
      - "Service"
      - "LoadBalancer"
      - "tenant.meta.x-k8s.io/id"
      - "cluster.meta.x-k8s.io/name"
      - "service.beta.kubernetes.io/kinx-load-balancer-id"
      - "cluster.x-k8s.io.ew/resource-id"
      - "service.kubernetes.io/load-balancer-cleanup"
      - "PENDING_CREATE"
      - "PENDING_UPDATE"
      - "PENDING_DELETE"
      - "ACTIVE"
      - "ERROR"
      - "resource-create-completed"
      - "resource-update-completed"
      - "resource-delete-completed"
    cause: "Workload Service LB state is synchronized from workload Service annotations/finalizers and external LB provisioning state observed by controllers."
    resolution: "Use workload context to inspect the Service, then compare LB ID, provisioning state evidence, deletionTimestamp, cleanup finalizer, and synchronization annotations."
    decision_hints:
      - "This is a workload-cluster resource. Do not run Service LB inspection against the management cluster context."
      - "Missing LB ID annotation means creation may be pending or not synchronized."
      - "PENDING_CREATE or PENDING_UPDATE means external LB is still progressing."
      - "ERROR means LB-side failure."
      - "Service deletion completes only after load-balancer-cleanup finalizer is gone and external LB is deleted or not found."
      - "Service metadata uses tenant.meta.x-k8s.io/id and cluster.meta.x-k8s.io/name annotations, so label selectors may not find every object."
      - "After confirming the admin kubeconfig Secret exists, ask the user to inspect workload Services with the prepared workload context. Do not put workload_context commands into guide diagnostic_steps."
    related_objects:
      - Service
      - Secret
      - Cluster
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect tenant admin kubeconfig Secret before workload Service observation"
        command_template: "kubectl -n {{namespace}} get secret {{cluster_name}}-admin-kubeconfig -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "The kubeconfig source for workload_context is present or absent."
    risk_level: medium
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "service", "loadbalancer", "workload", "detail", "issue-tracing"]

