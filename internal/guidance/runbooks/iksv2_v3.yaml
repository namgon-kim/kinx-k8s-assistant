    cause: "Workload resources are observed through the workload cluster context and synchronized by event-watcher; management-cluster CRDs alone do not show Service/PV object state."
    resolution: "Prepare workload kubeconfig/context first, then inspect Service/PV/PVC/VolumeAttachment state and compare with synchronization annotations and finalizers."
    decision_hints:
      - "This guide is for workload resources. Do not run workload Service/PV commands against the management cluster context."
      - "Service LB ID missing means create may be pending or synchronization has not observed the external LB."
      - "load-balancer-cleanup finalizer remaining means Service delete cleanup is not complete."
      - "Cinder and Manila CSI drivers identify managed PVs."
      - "PV phase Available or Bound with volumeHandle is create evidence."
      - "VolumeAttachment.status.attached=true is attach evidence."
      - "PV deletion requires pv-protection finalizer removal before delete completion."
      - "If workload context is unavailable, report it as a blocker and do not invent management-cluster evidence."
      - "After confirming the admin kubeconfig Secret exists, ask the user to inspect workload Services, PVs, PVCs, and VolumeAttachments with the prepared workload context. Do not put workload_context commands into guide diagnostic_steps."
    related_objects:
      - Service
      - PersistentVolume
      - PersistentVolumeClaim
      - VolumeAttachment
      - Secret
      - Cluster
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect tenant admin kubeconfig Secret before workload observation"
        command_template: "kubectl -n {{namespace}} get secret {{cluster_name}}-admin-kubeconfig -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "The kubeconfig source for workload_context is present or absent."
    risk_level: medium
