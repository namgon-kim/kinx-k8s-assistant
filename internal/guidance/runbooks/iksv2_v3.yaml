      - "OpenStackMachine delete failed"
      - "Machine finalizer remains"
    evidence_keywords:
      - "deletionTimestamp"
      - "DrainingSucceeded"
      - "VolumeDetachSucceeded"
      - "MachineFinalizer"
      - "OpenStackMachine"
      - "InstanceDeleteFailed"
      - "NodeDrain"
      - "VolumeAttachment"
      - "providerID"
      - "finalizers"
    cause: "Machine deletion can be blocked by drain, volume detach, CAPI finalizer cleanup, or OpenStack instance deletion."
    resolution: "Inspect Machine deletion conditions and paired OpenStackMachine delete state, then identify whether Kubernetes drain/detach or OpenStack instance deletion is the blocker."
    decision_hints:
      - "Machine.deletionTimestamp means deletion lifecycle is active."
      - "DrainingSucceeded=False or Unknown means pod drain is still blocking or in progress."
      - "VolumeDetachSucceeded=False or Unknown means volume detach is still blocking or in progress."
      - "OpenStackMachine InstanceDeleteFailed is VM deletion failure evidence."
      - "MachineFinalizer remaining means CAPI cleanup has not completed."
      - "Do not treat old Machine create failure as deletion blocker if delete-specific conditions identify another layer."
    related_objects:
      - Machine
      - OpenStackMachine
      - VolumeAttachment
      - Node
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect deleting Machines and their conditions"
        command_template: "kubectl -n {{namespace}} get machine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Machine deletionTimestamp, finalizers, drain, detach, and node cleanup conditions are visible."
      - type: diagnostic
        description: "Inspect OpenStackMachine delete state"
        command_template: "kubectl -n {{namespace}} get openstackmachine -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "InstanceDeleteFailed or other infra delete reasons are visible."
    risk_level: medium
