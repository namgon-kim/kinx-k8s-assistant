  - id: iksv2-v3-controller-log-followup
    title: "IKS v2 Controller Log Follow-up After CRD Trace"
    symptoms:
      - "CRD state identifies a responsible controller but not the internal reconciliation reason"
      - "Controller-created child resource is missing after parent readiness is confirmed"
      - "Watcher or processor synchronization appears delayed after CRD evidence is collected"
      - "Cleanup is stuck but Kubernetes child/finalizer evidence does not explain why"
    evidence_keywords:
      - "event-watcher"
      - "event-processor"
      - "capi-controller-manager"
      - "capo-controller-manager"
      - "caaph-controller-manager"
      - "capi-kamaji-controller-manager"
      - "kamaji"
      - "cluster key"
      - "controller logs"
      - "reconcile"
      - "cleanup"
    cause: "Controller logs are secondary evidence used only after CRD status narrows the responsible controller or sync component."
    resolution: "Ask the user to run cluster-filtered controller log commands for the responsible controller. Do not claim logs were observed unless a log command actually ran."
    decision_hints:
      - "Do not use this guide as the first guide for a generic Cluster problem."
      - "Do not search logs only by ERROR; always filter by cluster name or cluster key first."
      - "event-watcher records observation and synchronization markers."
      - "event-processor handles lifecycle operations and cleanup."
      - "If MachineSet or Machine is missing, inspect capi-controller-manager logs."
      - "If OpenStackMachine or OpenStackCluster is stuck, inspect capo-controller-manager logs."
      - "If HelmReleaseProxy is missing or failed, inspect caaph-controller-manager logs."
      - "If TenantControlPlane is missing or not ready, inspect Kamaji controller logs."
    related_objects:
      - Cluster
      - MachineDeployment
      - Machine
      - OpenStackMachine
      - HelmReleaseProxy
      - TenantControlPlane
      - ServiceGatewayClaim
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "logs", "controller", "followup", "secondary-evidence", "issue-tracing"]
