      - "Cluster resume is requested but not completed"
      - "operation-state remains suspend-requested, suspend-applied, resume-requested, or resume-applied"
      - "Control plane or addon replicas do not converge after suspend/resume"
    evidence_keywords:
      - "operation-state"
      - "suspend-requested"
      - "suspend-applied"
      - "resume-requested"
      - "resume-applied"
      - "last-suspended-done"
      - "last-resumed-done"
      - "spec.replicas"
      - "readyReplicas"
      - "spec.suspend"
      - "cluster.x-k8s.io/paused"
    cause: "Suspend/resume is a multi-resource operation applied by event-processor and confirmed by replica convergence, HelmRelease suspend state, CAPI pause state, and done annotations."
    resolution: "Inspect operation-state, KCP replicas, addon HelmRelease suspend flags, component Deployment replicas, MachineDeployment replicas, pause annotations, and done markers."
    decision_hints:
      - "operation-state=suspend-requested means processor has not applied suspend."
      - "operation-state=suspend-applied means scale-down convergence is pending."
      - "operation-state=resume-requested means processor has not applied resume."
      - "operation-state=resume-applied means recovery convergence is pending."
      - "resume-requested without last-suspended-done is an abnormal sequence."
      - "Suspend is complete only when KCP, addon, and worker expectations match the suspended state and last-suspended-done exists."
      - "Resume is complete only when KCP/addon/workers recover and last-resumed-done exists."
    related_objects:
      - Cluster
      - KamajiControlPlane
      - HelmRelease
      - Deployment
      - MachineDeployment
    diagnostic_steps:
      - type: diagnostic
        description: "Inspect operation metadata on Cluster"
        command_template: "kubectl -n {{namespace}} get cluster {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "operation-state, pause annotations, and done markers are visible."
      - type: diagnostic
        description: "Inspect control-plane replica convergence"
        command_template: "kubectl -n {{namespace}} get kamajicontrolplane {{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "KCP replica state can be compared with suspend/resume expectations."
      - type: diagnostic
        description: "Inspect worker replica convergence"
        command_template: "kubectl -n {{namespace}} get machinedeployment -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Worker replica state can be compared with suspend/resume expectations."
      - type: diagnostic
        description: "Inspect addon suspend/resume state"
        command_template: "kubectl -n {{namespace}} get helmrelease,deployment -l cluster.x-k8s.io/cluster-name={{cluster_name}} -o yaml"
        automatic_candidate: true
        requires_confirmation: false
        expected_outcome: "Addon suspend flags and component Deployment replica convergence are visible."
    risk_level: low
    source: "iksv2-issue-tracing-v3"
    tags: ["iksv2", "suspend", "resume", "operation-state", "issue-tracing"]

