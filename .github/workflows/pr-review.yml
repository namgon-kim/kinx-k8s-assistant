name: PR Reviewer

on:
  pull_request:
    types:
      - labeled

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  claude-review:
    name: Claude Review
    runs-on:
      - self-hosted
      - pr-review

    if: github.event.label.name == 'review:claude'

    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_API_URL: ${{ github.api_url }}

      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude review
        run: sudo -n /opt/pr-review-tools/run-claude-review

  codex-review:
    name: Codex Review
    runs-on:
      - self-hosted
      - pr-review

    if: github.event.label.name == 'review:codex'

    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_API_URL: ${{ github.api_url }}

      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Codex review
        run: sudo -n /opt/pr-review-tools/run-codex-review
